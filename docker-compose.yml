services:
  wa-crm:
    build:
      context: .
      args:
        - VITE_USE_OPENAI=${VITE_USE_OPENAI:-false}
        - VITE_OPENAI_API_KEY=${VITE_OPENAI_API_KEY:-}
        - VITE_OPENAI_API_BASE=${VITE_OPENAI_API_BASE:-https://api.openai.com/v1}
        - VITE_OPENAI_MODEL=${VITE_OPENAI_MODEL:-gpt-4o}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-wa_crm_password}
      - DB_NAME=wa_crm_v2
      - DB_MIGRATE_ON_STARTUP=${DB_MIGRATE_ON_STARTUP:-true}
      - DB_MIGRATION_ANALYZE_AFTER=${DB_MIGRATION_ANALYZE_AFTER:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - USE_OPENAI=${USE_OPENAI:-false}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimaxi.com/anthropic}
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./.wwebjs_cache:/app/.wwebjs_cache
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-wa_crm_password}
      - MYSQL_DATABASE=wa_crm_v2
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
